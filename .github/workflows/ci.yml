name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"

      - name: Install from lock
        run: uv sync --locked

      - name: Lint (ruff)
        run: uv run ruff check orchestrator tests

      - name: Lint (wemake-python-styleguide)
        run: uv run flake8 orchestrator tests --select=WPS

      - name: Tests (pytest)
        run: uv run python -m pytest tests
